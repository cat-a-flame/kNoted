<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Crochet Notebook</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F7F4EF;--surface:#fff;--surface2:#F0EDE7;--surface3:#E8E4DC;
  --border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.17);
  --text:#1C1A17;--text2:#6B6660;--text3:#A09B96;
  --teal:#1D9E75;--teal-l:#E1F5EE;--teal-m:#9FE1CB;--teal-d:#085041;
  --coral:#D85A30;--coral-l:#FAECE7;
  --amber:#BA7517;--amber-l:#FAEEDA;
  --r-sm:8px;--r-md:12px;--r-lg:16px;
  --sans:'DM Sans',system-ui,sans-serif;--serif:'Lora',Georgia,serif;
  --sidebar:244px;--trans:.17s ease;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;}

/* ── Layout ─────────────────────────────────────── */
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;}
.logo{padding:20px 18px 16px;font-family:var(--serif);font-size:18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);margin-bottom:8px;}
.logo-mark{width:26px;height:26px;border-radius:50%;border:2px solid var(--teal);background:var(--teal-l);flex-shrink:0;position:relative;}
.logo-mark::after{content:'';position:absolute;inset:5px;border-radius:50%;background:var(--teal);}
.nav{flex:1;padding:0 8px;display:flex;flex-direction:column;gap:1px;}
.ni{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:var(--r-sm);font-size:13.5px;color:var(--text2);cursor:pointer;transition:background var(--trans),color var(--trans);user-select:none;}
.ni:hover{background:var(--surface2);color:var(--text);}
.ni.active{background:var(--teal-l);color:var(--teal-d);font-weight:500;}
.ni svg{width:15px;height:15px;flex-shrink:0;opacity:.65;}
.ni.active svg{opacity:1;}
.ni.arch svg{opacity:.65;}
.nav-sep{height:1px;background:var(--border);margin:6px 8px;}
.sidebar-foot{padding:10px 8px 16px;}
.btn-new{width:100%;padding:8px 12px;border-radius:var(--r-sm);border:1.5px solid var(--teal);background:var(--teal-l);color:var(--teal-d);font-size:13.5px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background var(--trans);font-family:var(--sans);}
.btn-new:hover{background:var(--teal-m);}
.btn-new svg{width:13px;height:13px;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{height:56px;padding:0 22px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.topbar-title{font-family:var(--serif);font-size:16px;flex:1;}
.btn-icon{width:30px;height:30px;border-radius:50%;border:1px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background var(--trans);flex-shrink:0;}
.btn-icon:hover{background:var(--surface2);}
.btn-icon svg{width:13px;height:13px;}
.content{flex:1;overflow-y:auto;padding:22px;}

/* ── Screens ─────────────────────────────────────── */
.screen{display:none;}
.screen.active{display:block;animation:fi .18s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* ── Library ─────────────────────────────────────── */
.lib-tabs{display:flex;gap:6px;margin-bottom:18px;}
.ltab{padding:5px 16px;border-radius:99px;border:1px solid var(--border);background:transparent;font-size:13px;color:var(--text2);cursor:pointer;transition:all var(--trans);font-family:var(--sans);}
.ltab:hover{border-color:var(--border2);color:var(--text);}
.ltab.on{background:var(--teal-l);border-color:var(--teal-m);color:var(--teal-d);font-weight:500;}
.ltab.arch-tab.on{background:var(--amber-l);border-color:var(--amber);color:var(--amber);}
.pat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(218px,1fr));gap:12px;}
.pat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;cursor:pointer;transition:border-color var(--trans),transform var(--trans);position:relative;}
.pat-card:hover{border-color:var(--teal-m);transform:translateY(-2px);}
.pat-card.archived{opacity:.65;}
.pat-card.archived:hover{border-color:var(--amber);transform:none;}
.pc-name{font-family:var(--serif);font-size:14.5px;margin-bottom:5px;color:var(--text);padding-right:28px;}
.pc-meta{font-size:12px;color:var(--text3);display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.badge{padding:2px 8px;border-radius:99px;font-size:10.5px;font-weight:500;}
.badge-active{background:var(--teal-l);color:var(--teal-d);}
.badge-done{background:var(--surface2);color:var(--text2);}
.badge-arch{background:var(--amber-l);color:var(--amber);}
.prog-track{height:3px;background:var(--surface2);border-radius:99px;}
.prog-fill{height:3px;border-radius:99px;background:var(--teal);transition:width .4s ease;}
.pc-menu-btn{position:absolute;top:12px;right:12px;width:24px;height:24px;border-radius:50%;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:background var(--trans);}
.pc-menu-btn:hover{background:var(--surface2);color:var(--text);}
.pc-menu-btn svg{width:14px;height:14px;}
.empty-state{text-align:center;padding:56px 20px;color:var(--text3);font-size:14px;}
.es-icon{font-size:34px;margin-bottom:12px;opacity:.35;}

/* ── Context menu ─────────────────────────────────── */
.ctx-menu{position:fixed;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-md);padding:4px;z-index:500;min-width:160px;box-shadow:0 4px 16px rgba(0,0,0,.12);}
.ctx-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--r-sm);font-size:13px;color:var(--text);cursor:pointer;transition:background var(--trans);}
.ctx-item:hover{background:var(--surface2);}
.ctx-item.danger{color:var(--coral);}
.ctx-item.danger:hover{background:var(--coral-l);}
.ctx-item svg{width:13px;height:13px;flex-shrink:0;opacity:.7;}

/* ── Rows view ─────────────────────────────────────── */
.rows-layout{display:grid;grid-template-columns:1fr 280px;gap:18px;align-items:start;}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.edit-toggle{padding:5px 13px;border-radius:99px;border:1px solid var(--border2);background:transparent;font-size:12px;color:var(--text2);cursor:pointer;transition:all var(--trans);display:flex;align-items:center;gap:5px;font-family:var(--sans);}
.edit-toggle:hover{background:var(--surface2);color:var(--text);}
.edit-toggle.on{background:var(--coral-l);border-color:var(--coral);color:var(--coral);}
.edit-toggle svg{width:11px;height:11px;}
.rows-list{display:flex;flex-direction:column;gap:8px;}

/* Row card */
.row-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);transition:border-color var(--trans),opacity var(--trans);}
.row-card.current{border:2px solid var(--teal);}
.row-card.done-card{opacity:.36;}
.rc-main{display:flex;align-items:center;gap:10px;padding:14px 14px 14px 14px;}
.drag-handle{cursor:grab;color:var(--text3);display:none;flex-shrink:0;padding:0 2px;}
.drag-handle:active{cursor:grabbing;}
.drag-handle svg{width:14px;height:14px;}
.edit-mode .drag-handle{display:flex;align-items:center;}
.rc-num{width:24px;height:24px;border-radius:50%;background:var(--surface2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:500;color:var(--text2);}
.rc-num.cur{background:var(--teal-l);color:var(--teal-d);}
.rc-body-wrap{flex:1;min-width:0;}
.rc-title{font-size:13.5px;font-weight:500;color:var(--text);}
.done-card .rc-title{text-decoration:line-through;color:var(--text3);}
.rc-pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.spill{display:inline-flex;align-items:center;gap:3px;background:var(--surface2);border-radius:99px;padding:2px 9px;font-size:11.5px;color:var(--text);}
.spill-n{font-weight:500;color:var(--teal);}
.info-wrap{position:relative;display:inline-flex;}
.info-btn{width:14px;height:14px;border-radius:50%;background:rgba(0,0,0,.11);border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:8.5px;font-weight:700;color:var(--text2);transition:background var(--trans);flex-shrink:0;padding:0;font-family:var(--sans);line-height:1;}
.info-btn:hover{background:var(--teal-m);color:var(--teal-d);}
.info-tip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--text);color:#fff;font-size:11px;line-height:1.4;padding:6px 10px;border-radius:var(--r-sm);width:190px;z-index:300;pointer-events:none;}
.info-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:var(--text);}
.info-wrap:hover .info-tip,.info-wrap:focus-within .info-tip{display:block;}
.rc-note{font-size:11.5px;color:var(--text2);font-style:italic;margin-top:5px;line-height:1.45;}
.rc-actions{display:flex;align-items:center;gap:4px;flex-shrink:0;}

/* Check button */
.check-btn{width:40px;height:40px;border-radius:50%;border:2px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--trans);}
.check-btn:hover{border-color:var(--teal-m);background:var(--teal-l);}
.check-btn.checked{background:var(--teal);border-color:var(--teal);}
.check-btn svg{width:18px;height:18px;}

/* Edit row action buttons */
.rc-edit-btns{display:none;align-items:center;gap:3px;}
.edit-mode .rc-edit-btns{display:flex;}
.edit-mode .check-btn{display:none;}
.row-action-btn{width:28px;height:28px;border-radius:var(--r-sm);border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all var(--trans);}
.row-action-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--border2);}
.row-action-btn.del:hover{background:var(--coral-l);color:var(--coral);border-color:var(--coral);}
.row-action-btn.dup:hover{background:var(--teal-l);color:var(--teal-d);border-color:var(--teal-m);}
.row-action-btn svg{width:13px;height:13px;}

/* Inline edit form */
.row-edit-form{border-top:1px solid var(--border);padding:12px 14px;display:flex;flex-direction:column;gap:8px;}
.erow{display:flex;gap:6px;align-items:center;}
.esel,.ein,.etxt{font-family:var(--sans);font-size:13px;border:1px solid var(--border2);border-radius:var(--r-sm);padding:6px 8px;background:var(--surface);color:var(--text);outline:none;transition:border-color var(--trans);}
.esel{flex:1;cursor:pointer;}
.ein{width:70px;flex:none;}
.etxt{width:100%;}
.esel:focus,.ein:focus,.etxt:focus{border-color:var(--teal);}
.echips{display:flex;flex-wrap:wrap;gap:4px;}
.echip{display:inline-flex;align-items:center;gap:5px;background:var(--teal-l);border-radius:99px;padding:3px 9px;font-size:11.5px;color:var(--teal-d);}
.echip button{border:none;background:transparent;cursor:pointer;color:var(--teal-d);opacity:.55;font-size:14px;line-height:1;padding:0;}
.echip button:hover{opacity:1;}
.edit-btns{display:flex;gap:6px;}
.edit-btns button{padding:5px 13px;border-radius:var(--r-sm);border:1px solid var(--border2);background:transparent;font-size:12px;color:var(--text);cursor:pointer;font-family:var(--sans);transition:background var(--trans);}
.edit-btns button:hover{background:var(--surface2);}
.edit-btns .save-eb{background:var(--teal-l);border-color:var(--teal-m);color:var(--teal-d);}
.edit-btns .save-eb:hover{background:var(--teal-m);}

/* Dragging state */
.row-card.dragging{opacity:.35;border:2px dashed var(--teal);}
.row-card.drag-over{border-top:3px solid var(--teal);}

/* Side panel */
.panel-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;margin-bottom:12px;}
.panel-label{font-size:10.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.prog-big{font-family:var(--serif);font-size:30px;color:var(--text);line-height:1;margin-bottom:3px;}
.prog-sub{font-size:12px;color:var(--text3);margin-bottom:12px;}

/* Add row in panel */
.row-builder{background:var(--surface2);border-radius:var(--r-md);padding:12px;margin-bottom:12px;}
.rb-head{font-size:11px;color:var(--text2);font-weight:500;margin-bottom:9px;text-transform:uppercase;letter-spacing:.04em;}
.tech-row{display:flex;gap:6px;margin-bottom:6px;}
.tech-row select{flex:1;font-family:var(--sans);font-size:13px;padding:7px 9px;border:1px solid var(--border2);border-radius:var(--r-sm);background:var(--surface);color:var(--text);outline:none;cursor:pointer;}
.tech-row select:focus{border-color:var(--teal);}
.tech-row input{width:64px;flex:none;padding:7px 8px;border:1px solid var(--border2);border-radius:var(--r-sm);background:var(--surface);color:var(--text);font-family:var(--sans);font-size:13px;outline:none;}
.tech-row input:focus{border-color:var(--teal);}
.add-chip-btn{padding:7px 11px;border-radius:var(--r-sm);border:1px solid var(--border2);background:var(--surface);font-size:12px;color:var(--text);cursor:pointer;transition:all var(--trans);font-family:var(--sans);}
.add-chip-btn:hover{background:var(--teal-l);border-color:var(--teal-m);color:var(--teal-d);}
.pchips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:3px 9px;font-size:11.5px;color:var(--text);}
.chip-del{border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:14px;line-height:1;padding:0;}
.chip-del:hover{color:var(--coral);}
.row-name-in{width:100%;font-family:var(--sans);font-size:13px;padding:7px 9px;border:1px solid var(--border2);border-radius:var(--r-sm);background:var(--surface);color:var(--text);outline:none;margin-bottom:6px;}
.row-name-in:focus{border-color:var(--teal);}
.add-row-btn{width:100%;padding:8px;border-radius:var(--r-sm);border:1.5px solid var(--teal);background:var(--teal-l);color:var(--teal-d);font-size:13px;font-weight:500;cursor:pointer;transition:background var(--trans);font-family:var(--sans);}
.add-row-btn:hover{background:var(--teal-m);}

/* Add pattern form */
.add-layout{max-width:560px;}
.form-group{margin-bottom:16px;}
.form-label{font-size:12px;color:var(--text2);font-weight:500;margin-bottom:5px;display:block;}
.form-input{width:100%;padding:9px 11px;border:1px solid var(--border2);border-radius:var(--r-sm);background:var(--surface);color:var(--text);font-family:var(--sans);font-size:14px;outline:none;transition:border-color var(--trans);}
.form-input:focus{border-color:var(--teal);}
.saved-rows-list{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.saved-row{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:9px 12px;}
.saved-row-num{width:20px;height:20px;border-radius:50%;background:var(--teal-l);display:flex;align-items:center;justify-content:center;font-size:10.5px;color:var(--teal-d);font-weight:500;flex-shrink:0;}
.saved-row-txt{flex:1;font-size:12px;color:var(--text2);}
.saved-row-del{border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:17px;line-height:1;padding:2px 4px;transition:color var(--trans);}
.saved-row-del:hover{color:var(--coral);}
.divider{height:1px;background:var(--border);margin:18px 0;}
.btn{padding:8px 15px;border-radius:var(--r-sm);border:1px solid var(--border2);background:transparent;font-size:13px;color:var(--text);cursor:pointer;transition:background var(--trans);font-family:var(--sans);}
.btn:hover{background:var(--surface2);}
.btn.teal{background:var(--teal-l);border-color:var(--teal-m);color:var(--teal-d);font-weight:500;}
.btn.teal:hover{background:var(--teal-m);}
.btn.teal-solid{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:500;}
.btn.teal-solid:hover{background:var(--teal-d);border-color:var(--teal-d);}

/* Stats */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:24px;}
.stat-card{background:var(--surface2);border-radius:var(--r-md);padding:14px;}
.stat-label{font-size:10.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px;}
.stat-value{font-family:var(--serif);font-size:28px;color:var(--text);line-height:1;}
.section-head{font-family:var(--serif);font-size:14.5px;color:var(--text);margin-bottom:12px;}
.heatmap-wrap{margin-bottom:24px;}
.heatmap{display:flex;flex-wrap:wrap;gap:3px;}
.hm-day{width:12px;height:12px;border-radius:3px;background:var(--surface2);}
.hm-day.l1{background:var(--teal-l);}
.hm-day.l2{background:var(--teal-m);}
.hm-day.l3{background:var(--teal);}
.hm-legend{display:flex;align-items:center;gap:4px;margin-top:7px;font-size:11px;color:var(--text3);}
.stat-pats{display:flex;flex-direction:column;gap:12px;}
.stat-ph{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;}
.stat-pn{color:var(--text);font-weight:500;}
.stat-pp{color:var(--text3);}

/* Done screen */
.done-all{text-align:center;padding:36px 20px;color:var(--text2);font-size:14px;}
.done-icon{width:48px;height:48px;border-radius:50%;background:var(--teal-l);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}

/* Mobile nav */
.mob-nav{display:none;flex-shrink:0;border-top:1px solid var(--border);background:var(--surface);}
.mob-nav-inner{display:flex;}
.mnb{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 4px 7px;gap:3px;border:none;background:transparent;font-size:9.5px;color:var(--text3);cursor:pointer;transition:color var(--trans);font-family:var(--sans);}
.mnb.active{color:var(--teal);}
.mnb svg{width:19px;height:19px;}

/* Responsive */
@media(max-width:680px){
  .sidebar{display:none;}
  .mob-nav{display:block;}
  .topbar{padding:0 14px;height:50px;}
  .content{padding:14px;}
  .rows-layout{grid-template-columns:1fr;}
  .side-col{order:-1;}
  .stat-grid{grid-template-columns:1fr 1fr;}
  .pat-grid{grid-template-columns:1fr;}
  .add-layout{max-width:100%;}
}
@media(max-width:880px) and (min-width:681px){.rows-layout{grid-template-columns:1fr 240px;}}

/* Toast */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--text);color:#fff;padding:9px 18px;border-radius:var(--r-md);font-size:13px;transition:transform .28s ease,opacity .28s ease;opacity:0;pointer-events:none;z-index:9999;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* Confirm overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:800;display:flex;align-items:center;justify-content:center;}
.confirm-box{background:var(--surface);border-radius:var(--r-lg);padding:24px;max-width:340px;width:90%;border:1px solid var(--border);}
.confirm-title{font-family:var(--serif);font-size:16px;margin-bottom:8px;}
.confirm-msg{font-size:13.5px;color:var(--text2);margin-bottom:20px;line-height:1.5;}
.confirm-btns{display:flex;gap:8px;justify-content:flex-end;}
</style>
</head>
<body>
<div class="app">

  <aside class="sidebar">
    <div class="logo"><div class="logo-mark"></div>Crochet Notebook</div>
    <nav class="nav">
      <div class="ni active" id="snav-library" onclick="navTo('library')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="2" y="2" width="5" height="12" rx="1.5"/><rect x="9" y="2" width="5" height="12" rx="1.5"/></svg>My Patterns
      </div>
      <div class="ni" id="snav-stats" onclick="navTo('stats')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><polyline points="2,13 5,8 8,10 12,5 15,7"/></svg>Statistics
      </div>
      <div class="nav-sep"></div>
      <div class="ni" id="snav-add" onclick="startNew()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>New Pattern
      </div>
    </nav>
    <div class="sidebar-foot">
      <button class="btn-new" onclick="startNew()">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg>
        New Pattern
      </button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <button class="btn-icon" id="back-btn" onclick="goBack()" style="display:none">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9,2 4,7 9,12"/></svg>
      </button>
      <div class="topbar-title" id="page-title">My Patterns</div>
      <button class="btn-new" id="topbar-add" onclick="startNew()" style="width:auto;padding:6px 13px;font-size:13px;">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg>
        New
      </button>
    </header>

    <main class="content">

      <!-- Library -->
      <div class="screen active" id="scr-library">
        <div class="lib-tabs">
          <button class="ltab on" onclick="setLibTab(this,'active')">Active</button>
          <button class="ltab arch-tab" onclick="setLibTab(this,'archived')">Archived</button>
        </div>
        <div class="pat-grid" id="library-grid"></div>
      </div>

      <!-- Rows -->
      <div class="screen" id="scr-rows">
        <div class="rows-layout">
          <div id="rows-col">
            <div class="toolbar">
              <button class="edit-toggle" id="edit-toggle" onclick="toggleEdit()">
                <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M9 2l3 3L4 13H1v-3L9 2z"/></svg>
                Edit rows
              </button>
            </div>
            <div class="rows-list" id="rows-list"></div>
          </div>
          <div class="side-col">
            <div class="panel-card" id="prog-panel">
              <div class="panel-label">Progress</div>
              <div class="prog-big" id="prog-big">0 / 0</div>
              <div class="prog-sub" id="prog-sub">rows done</div>
              <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
            </div>
            <div class="row-builder" id="add-row-panel" style="display:none">
              <div class="rb-head">Add a new row</div>
              <div class="tech-row">
                <select id="panel-tech"><option value="">Choose stitch…</option></select>
                <input id="panel-count" type="number" min="1" placeholder="×" />
                <button class="add-chip-btn" onclick="addChip('panel-tech','panel-count','panel-chips')">+</button>
              </div>
              <div class="pchips" id="panel-chips"></div>
              <input class="row-name-in" id="panel-row-name" type="text" placeholder="Row name (optional, e.g. Foundation chain)" />
              <input class="row-name-in" id="panel-note" type="text" placeholder="Note (optional)" style="margin-bottom:8px;" />
              <button class="add-row-btn" onclick="addRowToPattern()">+ Add row</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Stats -->
      <div class="screen" id="scr-stats">
        <div class="stat-grid">
          <div class="stat-card"><div class="stat-label">Finished patterns</div><div class="stat-value" id="st-done">–</div></div>
          <div class="stat-card"><div class="stat-label">Rows completed</div><div class="stat-value" id="st-rows">–</div></div>
          <div class="stat-card"><div class="stat-label">Active patterns</div><div class="stat-value" id="st-active">–</div></div>
          <div class="stat-card"><div class="stat-label">Avg progress</div><div class="stat-value" id="st-avg">–</div></div>
        </div>
        <div class="heatmap-wrap">
          <div class="section-head">Activity — last 70 days</div>
          <div class="heatmap" id="heatmap"></div>
          <div class="hm-legend"><div class="hm-day"></div>less<div class="hm-day l1"></div><div class="hm-day l2"></div><div class="hm-day l3"></div>more</div>
        </div>
        <div class="section-head">Pattern progress</div>
        <div class="stat-pats" id="stat-pats"></div>
      </div>

      <!-- Add pattern -->
      <div class="screen" id="scr-add">
        <div class="add-layout">
          <div class="form-group">
            <label class="form-label">Pattern name</label>
            <input class="form-input" id="new-name" type="text" placeholder="e.g. Flower top" />
          </div>
          <div class="divider"></div>
          <div class="form-label" style="margin-bottom:10px;font-size:13px;color:var(--text2);">Rows</div>
          <div class="saved-rows-list" id="saved-rows"></div>
          <div class="row-builder" style="background:var(--surface2);border-radius:var(--r-md);padding:14px;margin-bottom:16px;">
            <div class="rb-head">Build a row</div>
            <div class="tech-row">
              <select id="s-tech"><option value="">Choose stitch…</option></select>
              <input id="s-count" type="number" min="1" placeholder="×" />
              <button class="add-chip-btn" onclick="addChip('s-tech','s-count','form-chips')">+</button>
            </div>
            <div class="pchips" id="form-chips"></div>
            <input class="row-name-in" id="s-rowname" type="text" placeholder="Row name (optional)" />
            <input class="row-name-in" id="s-note" type="text" placeholder="Note (optional)" style="margin-bottom:8px;" />
            <button class="btn teal" style="width:100%;" onclick="finalizeRow()">+ Add row</button>
          </div>
          <div class="divider"></div>
          <button class="btn teal-solid" style="width:100%;padding:11px;" onclick="savePattern()">Save pattern</button>
        </div>
      </div>

    </main>

    <nav class="mob-nav">
      <div class="mob-nav-inner">
        <button class="mnb active" id="mnav-library" onclick="navTo('library')">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="2" y="2" width="5" height="12" rx="1.5"/><rect x="9" y="2" width="5" height="12" rx="1.5"/></svg>Patterns
        </button>
        <button class="mnb" id="mnav-stats" onclick="navTo('stats')">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><polyline points="2,13 5,8 8,10 12,5 15,7"/></svg>Stats
        </button>
        <button class="mnb" id="mnav-add" onclick="startNew()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>New
        </button>
      </div>
    </nav>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="ctx-menu-el" class="ctx-menu" style="display:none"></div>

<script>
/* ══ STITCHES ══════════════════════════════════════ */
const TECH=[
  {name:"Chain st.",      desc:"The foundation of everything. Simple loop pulled through — used for foundation chains and turning chains."},
  {name:"Magic ring",     desc:"A circular start: you form a yarn loop and crochet directly into it, then pull tight."},
  {name:"Single crochet", desc:"The shortest stitch. Insert hook, pull up a loop, then draw through both loops at once."},
  {name:"Half double cr.",desc:"Between sc and dc. Yarn over, insert, pull up loop, then draw through all 3 loops at once."},
  {name:"Double crochet", desc:"The standard stitch. Yarn over, insert, pull up loop, then work off 2 loops twice (2 steps)."},
  {name:"Treble crochet", desc:"Yarn over twice before inserting. Taller than dc — great for lacy patterns."},
  {name:"Increase",       desc:"Work 2 (or more) stitches into the same stitch — adds stitches to increase count."},
  {name:"Decrease",       desc:"Join 2 adjacent stitches into one — reduces stitch count (common in amigurumi shaping)."},
  {name:"Crab stitch",    desc:"Single crochet worked backwards (right to left). Creates a firm, twisted decorative border."},
  {name:"Popcorn st.",    desc:"Work 5 dc into one stitch, then close together — creates a raised, bobble-like bump."},
  {name:"Leaf stitch",    desc:"An oval leaf motif, typically built from 5–7 double crochets."},
  {name:"Turning chain",  desc:"Chain(s) at end of row to match next row height. 1 for sc, 2 for hdc, 3 for dc."},
  {name:"Slip stitch",    desc:"Joining stitch — no height. Used to close rounds or move to a new position."},
];

/* ══ STORAGE ════════════════════════════════════════ */
const Store={
  KEY:'crochet_nb_v1',
  save(d){try{localStorage.setItem(this.KEY,JSON.stringify(d));}catch(e){}},
  load(){try{const r=localStorage.getItem(this.KEY);return r?JSON.parse(r):null;}catch(e){return null;}}
};

/* ══ HELPERS ════════════════════════════════════════ */
function uid(){return Math.random().toString(36).slice(2,10);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function techOpts(){return TECH.map(t=>`<option value="${esc(t.name)}">${esc(t.name)}</option>`).join('');}
function fillSelects(...ids){ids.forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=`<option value="">Choose stitch…</option>`+techOpts();});}

/* ══ DEMO DATA ══════════════════════════════════════ */
const DEMO=[
  {id:uid(),name:"Flower top",createdAt:Date.now()-86400000*5,activity:[Date.now()-86400000*2,Date.now()-86400000],archived:false,
   rows:[
    {id:uid(),title:"Foundation chain",stitches:[{name:"Chain st.",count:30}],note:"Work loosely."},
    {id:uid(),title:"Row 2",stitches:[{name:"Half double cr.",count:29}],note:""},
    {id:uid(),title:"Row 3",stitches:[{name:"Double crochet",count:10},{name:"Increase",count:4},{name:"Double crochet",count:15}],note:"On increase: work twice into same stitch."},
    {id:uid(),title:"Row 4",stitches:[{name:"Double crochet",count:32}],note:""},
    {id:uid(),title:"Row 5 – flower",stitches:[{name:"Chain st.",count:3},{name:"Treble crochet",count:5}],note:"Repeat motif 4 times."},
    {id:uid(),title:"Row 6 – border",stitches:[{name:"Crab stitch",count:34}],note:"Work right to left."},
   ],done:[true,true,false,false,false,false]},
  {id:uid(),name:"Snowflake hat",createdAt:Date.now()-86400000*12,activity:[Date.now()-86400000*5,Date.now()-86400000*4],archived:false,
   rows:[
    {id:uid(),title:"Row 1",stitches:[{name:"Magic ring",count:1},{name:"Double crochet",count:12}],note:""},
    {id:uid(),title:"Row 2",stitches:[{name:"Increase",count:12}],note:""},
    {id:uid(),title:"Row 3",stitches:[{name:"Double crochet",count:36}],note:""},
    {id:uid(),title:"Row 4 – pattern",stitches:[{name:"Popcorn st.",count:6},{name:"Double crochet",count:6}],note:"Alternate."},
   ],done:[true,true,true,true]},
  {id:uid(),name:"Summer bag",createdAt:Date.now()-86400000*2,activity:[Date.now()],archived:false,
   rows:[
    {id:uid(),title:"Foundation",stitches:[{name:"Chain st.",count:40}],note:""},
    {id:uid(),title:"Body rows",stitches:[{name:"Double crochet",count:40}],note:"Repeat 8 times."},
    {id:uid(),title:"Handles",stitches:[{name:"Chain st.",count:60},{name:"Half double cr.",count:2}],note:"Two handles, symmetrical."},
   ],done:[false,false,false]},
];

/* ══ STATE ══════════════════════════════════════════ */
let patterns=Store.load()||DEMO;
let S={page:'library',prev:null,activeId:null,editMode:false,editIdx:null,
       libTab:'active',formChips:[],newRows:[],panelChips:[]};

function save(){Store.save(patterns);}
function getP(){return patterns.find(p=>p.id===S.activeId);}
function curIdx(p){for(let i=0;i<p.done.length;i++)if(!p.done[i])return i;return -1;}

/* ══ CHIP STORE ═════════════════════════════════════ */
const CS={};
function addChip(selId,cntId,chipsId){
  const t=document.getElementById(selId)?.value;
  const n=parseInt(document.getElementById(cntId)?.value);
  if(!t||!n||n<1)return;
  if(!CS[chipsId])CS[chipsId]=[];
  CS[chipsId].push({name:t,count:n});
  document.getElementById(cntId).value='';
  refreshChips(chipsId);
}
function removeChip(id,i){CS[id].splice(i,1);refreshChips(id);}
function refreshChips(id){
  const el=document.getElementById(id);if(!el)return;
  el.innerHTML=(CS[id]||[]).map((s,i)=>
    `<span class="chip"><b style="color:var(--teal)">${s.count}×</b>&nbsp;${esc(s.name)}<button class="chip-del" onclick="removeChip('${id}',${i})">×</button></span>`
  ).join('');
}
function getChips(id){return CS[id]||[];}
function clearChips(id){CS[id]=[];refreshChips(id);}

/* ══ NAV ════════════════════════════════════════════ */
const TOPS=['library','stats','add'];
const TITLES={library:'My Patterns',stats:'Statistics',add:'New Pattern'};

function navTo(page,title){
  S.prev=TOPS.includes(S.page)?S.page:S.prev;
  S.page=page;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('scr-'+(page==='rows'?'rows':page)).classList.add('active');
  const isTop=TOPS.includes(page);
  document.getElementById('back-btn').style.display=isTop?'none':'';
  document.getElementById('topbar-add').style.display=(page==='rows'||page==='add')?'none':'';
  document.getElementById('page-title').textContent=title||TITLES[page]||'';
  ['library','stats'].forEach(id=>{
    document.getElementById('snav-'+id)?.classList.toggle('active',id===page);
    document.getElementById('mnav-'+id)?.classList.toggle('active',id===page);
  });
  document.getElementById('snav-add')?.classList.toggle('active',page==='add');
  document.getElementById('mnav-add')?.classList.toggle('active',page==='add');
  if(page==='library')renderLib();
  if(page==='stats')renderStats();
  if(page==='rows'){S.editMode=false;S.editIdx=null;renderRows();scrollToCurrent();}
}
function goBack(){navTo(S.prev||'library');}

/* ══ LIBRARY ════════════════════════════════════════ */
let libTab='active';
function setLibTab(btn,tab){
  libTab=tab;
  document.querySelectorAll('.ltab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderLib();
}
function renderLib(){
  const el=document.getElementById('library-grid');
  const list=patterns.filter(p=>libTab==='archived'?p.archived:!p.archived);
  if(!list.length){
    el.innerHTML=`<div class="empty-state"><div class="es-icon">🧶</div>${libTab==='archived'?'No archived patterns.':'No patterns yet.<br>Click "New Pattern" to get started!'}</div>`;
    return;
  }
  el.innerHTML=list.map(p=>{
    const dc=p.done.filter(Boolean).length,pct=Math.round(dc/p.rows.length*100),allDone=dc===p.rows.length;
    const badge=p.archived?'badge-arch':allDone?'badge-done':'badge-active';
    const badgeTxt=p.archived?'Archived':allDone?'Done':'In progress';
    return `<div class="pat-card ${p.archived?'archived':''}" onclick="openP('${p.id}')">
      <button class="pc-menu-btn" onclick="event.stopPropagation();showCtxMenu(event,'${p.id}')" title="Options">
        <svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="3" r="1.4"/><circle cx="8" cy="8" r="1.4"/><circle cx="8" cy="13" r="1.4"/></svg>
      </button>
      <div class="pc-name">${esc(p.name)}</div>
      <div class="pc-meta"><span>${dc} / ${p.rows.length} rows</span><span class="badge ${badge}">${badgeTxt}</span></div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}
function openP(id){
  S.activeId=id;S.editMode=false;S.editIdx=null;
  const p=getP(),today=new Date().setHours(0,0,0,0);
  if(!p.activity)p.activity=[];
  if(!p.activity.includes(today)){p.activity.push(today);save();}
  navTo('rows',p.name);
}

/* ══ CONTEXT MENU ═══════════════════════════════════ */
let ctxId=null;
function showCtxMenu(e,id){
  e.stopPropagation();
  ctxId=id;
  const p=patterns.find(x=>x.id===id);
  const menu=document.getElementById('ctx-menu-el');
  const isArchived=p.archived;
  menu.innerHTML=`
    <div class="ctx-item" onclick="ctxArchive()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="2" y="5" width="12" height="9" rx="1"/><path d="M5 5V4a3 3 0 016 0v1"/><line x1="6" y1="9" x2="10" y2="9"/></svg>
      ${isArchived?'Unarchive':'Archive'}
    </div>
    <div class="ctx-item danger" onclick="ctxDelete()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><polyline points="2,4 14,4"/><path d="M6 4V2h4v2"/><path d="M4 4l1 10h6l1-10"/><line x1="7" y1="7" x2="7" y2="11"/><line x1="9" y1="7" x2="9" y2="11"/></svg>
      Delete
    </div>`;
  menu.style.display='block';
  const x=Math.min(e.clientX,window.innerWidth-180);
  const y=Math.min(e.clientY,window.innerHeight-100);
  menu.style.left=x+'px';menu.style.top=y+'px';
}
function closeCtx(){document.getElementById('ctx-menu-el').style.display='none';ctxId=null;}
function ctxArchive(){
  const p=patterns.find(x=>x.id===ctxId);
  if(p){p.archived=!p.archived;save();renderLib();toast(p.archived?'Pattern archived.':'Pattern unarchived.');}
  closeCtx();
}
function ctxDelete(){
  closeCtx();
  const p=patterns.find(x=>x.id===ctxId);
  if(!p)return;
  showConfirm(`Delete "${p.name}"?`,'This cannot be undone.',()=>{
    patterns=patterns.filter(x=>x.id!==ctxId);
    save();renderLib();toast('Pattern deleted.');
  });
}
document.addEventListener('click',()=>closeCtx());

/* ══ ROWS ═══════════════════════════════════════════ */
function toggleEdit(){
  S.editMode=!S.editMode;S.editIdx=null;
  const btn=document.getElementById('edit-toggle');
  btn.classList.toggle('on',S.editMode);
  btn.innerHTML=S.editMode
    ?`<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><polyline points="2,7 6,11 12,3"/></svg> Done editing`
    :`<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M9 2l3 3L4 13H1v-3L9 2z"/></svg> Edit rows`;
  document.getElementById('add-row-panel').style.display=S.editMode?'':'none';
  if(S.editMode)fillSelects('panel-tech');
  document.getElementById('rows-list').classList.toggle('edit-mode',S.editMode);
  renderRows();
}

function pillsHTML(stitches){
  return stitches.map(s=>{
    const t=TECH.find(x=>x.name===s.name);
    const tip=t?`<span class="info-wrap"><button class="info-btn" tabindex="-1">i</button><span class="info-tip">${esc(t.desc)}</span></span>`:'';
    return `<span class="spill"><span class="spill-n">${s.count}×</span>&nbsp;${esc(s.name)}${tip}</span>`;
  }).join('');
}

function renderRows(){
  const p=getP();if(!p)return;
  const dc=p.done.filter(Boolean).length,total=p.rows.length,pct=Math.round(dc/total*100),cur=curIdx(p);
  document.getElementById('prog-big').textContent=dc+' / '+total;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-sub').textContent=dc===total?'All done! 🎉':'rows done';

  if(dc===total&&!S.editMode){
    document.getElementById('rows-list').innerHTML=`<div class="done-all"><div class="done-icon"><svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#1D9E75" stroke-width="2.5"><polyline points="3,12 8,17 19,6"/></svg></div>All rows complete!<br>Great work.</div>`;
    return;
  }

  const list=document.getElementById('rows-list');
  list.classList.toggle('edit-mode',S.editMode);

  let html='';
  p.rows.forEach((row,i)=>{
    const isDone=p.done[i],isActive=i===cur&&!S.editMode,isEditing=S.editMode&&S.editIdx===i;
    const numHtml=isDone&&!S.editMode
      ?`<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#085041" stroke-width="2.3"><polyline points="2,6 5,9 10,3"/></svg>`
      :(i+1);

    html+=`<div class="row-card ${isActive?'current':''} ${isDone&&!S.editMode?'done-card':''}" 
               data-idx="${i}" 
               ${S.editMode?`draggable="true" ondragstart="dragStart(event,${i})" ondragover="dragOver(event,${i})" ondrop="dragDrop(event,${i})" ondragend="dragEnd()"`:''}>
      <div class="rc-main">
        ${S.editMode?`<div class="drag-handle" title="Drag to reorder"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3"><line x1="2" y1="4" x2="12" y2="4"/><line x1="2" y1="7" x2="12" y2="7"/><line x1="2" y1="10" x2="12" y2="10"/></svg></div>`:''}
        <div class="rc-num ${isActive?'cur':''}">${numHtml}</div>
        <div class="rc-body-wrap">
          <div class="rc-title">${esc(row.title||(i+1)+'. row')}</div>
          <div class="rc-pills">${pillsHTML(row.stitches)}</div>
          ${row.note?`<div class="rc-note">${esc(row.note)}</div>`:''}
        </div>
        <div class="rc-actions">
          <div class="rc-edit-btns">
            <button class="row-action-btn dup" onclick="dupRow(${i})" title="Duplicate row">
              <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="4" y="4" width="8" height="8" rx="1"/><path d="M2 10V2h8"/></svg>
            </button>
            <button class="row-action-btn" onclick="startEditRow(${i})" title="Edit row">
              <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M9 2l3 3L4 13H1v-3L9 2z"/></svg>
            </button>
            <button class="row-action-btn del" onclick="deleteRow(${i})" title="Delete row">
              <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><polyline points="1,3 13,3"/><path d="M5 3V1h4v2"/><path d="M3 3l.9 9h6.2l.9-9"/></svg>
            </button>
          </div>
          <button class="check-btn ${isDone?'checked':''}" onclick="toggleRow(${i})" title="${isDone?'Uncheck':'Mark done'}">
            <svg viewBox="0 0 20 20" fill="none" stroke="${isDone?'#fff':'var(--border2)'}" stroke-width="2.5"><polyline points="3,10 8,15 17,5"/></svg>
          </button>
        </div>
      </div>
      ${isEditing?editFormHTML(i,row):''}
    </div>`;
  });
  list.innerHTML=html;
}

function scrollToCurrent(){
  const p=getP();if(!p)return;
  const cur=curIdx(p);if(cur<0)return;
  setTimeout(()=>{
    const cards=document.querySelectorAll('#rows-list .row-card');
    if(cards[cur])cards[cur].scrollIntoView({behavior:'smooth',block:'center'});
  },120);
}

function editFormHTML(i,row){
  const chips=(row.stitches||[]).map((s,si)=>
    `<span class="echip"><b>${s.count}×</b>&nbsp;${esc(s.name)}<button onclick="removeEditChip(${i},${si})">×</button></span>`
  ).join('');
  return `<div class="row-edit-form">
    <input class="etxt" id="et-name-${i}" type="text" value="${esc(row.title||'')}" placeholder="Row name" />
    <div class="echips" id="ec-${i}">${chips}</div>
    <div class="erow">
      <select class="esel" id="et-${i}"><option value="">Choose stitch…</option>${techOpts()}</select>
      <input class="ein" id="en-${i}" type="number" min="1" placeholder="×" />
      <button class="btn teal" style="padding:5px 10px;font-size:12px;" onclick="addEditChip(${i})">+</button>
    </div>
    <input class="etxt" id="enote-${i}" type="text" value="${esc(row.note||'')}" placeholder="Note (optional)" />
    <div class="edit-btns">
      <button class="save-eb" onclick="saveEditRow(${i})">Save</button>
      <button onclick="S.editIdx=null;renderRows()">Cancel</button>
    </div>
  </div>`;
}

function startEditRow(i){S.editIdx=S.editIdx===i?null:i;renderRows();}

function addEditChip(ri){
  const t=document.getElementById('et-'+ri)?.value,n=parseInt(document.getElementById('en-'+ri)?.value);
  if(!t||!n||n<1)return;
  getP().rows[ri].stitches.push({name:t,count:n});
  document.getElementById('en-'+ri).value='';
  renderRows();
}
function removeEditChip(ri,si){getP().rows[ri].stitches.splice(si,1);renderRows();}
function saveEditRow(ri){
  const p=getP();
  p.rows[ri].title=document.getElementById('et-name-'+ri)?.value.trim()||((ri+1)+'. row');
  p.rows[ri].note=document.getElementById('enote-'+ri)?.value.trim()||'';
  save();S.editIdx=null;toast('Row saved.');renderRows();
}
function deleteRow(ri){
  showConfirm('Delete this row?','This cannot be undone.',()=>{
    const p=getP();p.rows.splice(ri,1);p.done.splice(ri,1);save();S.editIdx=null;renderRows();toast('Row deleted.');
  });
}
function dupRow(ri){
  const p=getP();
  const orig=p.rows[ri];
  const copy={...orig,id:uid(),title:orig.title+' (copy)',stitches:orig.stitches.map(s=>({...s}))};
  p.rows.splice(ri+1,0,copy);
  p.done.splice(ri+1,0,false);
  save();renderRows();toast('Row duplicated.');
}

function toggleRow(i){
  const p=getP();p.done[i]=!p.done[i];
  if(p.done[i]){const today=new Date().setHours(0,0,0,0);if(!p.activity)p.activity=[];if(!p.activity.includes(today))p.activity.push(today);}
  save();renderRows();
}

/* ── Add row via panel ───────────────────────────── */
function addRowToPattern(){
  const tech=document.getElementById('panel-tech')?.value;
  const count=parseInt(document.getElementById('panel-count')?.value);
  if(tech&&count>=1)addChip('panel-tech','panel-count','panel-chips');
  const chips=getChips('panel-chips');
  if(!chips.length){toast('Add at least one stitch!');return;}
  const name=document.getElementById('panel-row-name')?.value.trim();
  const note=document.getElementById('panel-note')?.value.trim()||'';
  const p=getP();
  const rowNum=p.rows.length+1;
  p.rows.push({id:uid(),title:name||(rowNum+'. row'),stitches:[...chips],note});
  p.done.push(false);
  clearChips('panel-chips');
  document.getElementById('panel-row-name').value='';
  document.getElementById('panel-note').value='';
  save();toast('Row added.');renderRows();
}

/* ── Drag & Drop reorder ─────────────────────────── */
let dragFrom=null;
function dragStart(e,i){dragFrom=i;setTimeout(()=>document.querySelectorAll('.row-card')[i]?.classList.add('dragging'),0);}
function dragOver(e,i){e.preventDefault();document.querySelectorAll('.row-card').forEach((c,ci)=>c.classList.toggle('drag-over',ci===i&&i!==dragFrom));}
function dragDrop(e,i){
  e.preventDefault();
  if(dragFrom===null||dragFrom===i)return;
  const p=getP();
  const [rRow]=p.rows.splice(dragFrom,1);const [rDone]=p.done.splice(dragFrom,1);
  p.rows.splice(i,0,rRow);p.done.splice(i,0,rDone);
  save();dragFrom=null;renderRows();
}
function dragEnd(){document.querySelectorAll('.row-card').forEach(c=>{c.classList.remove('dragging','drag-over');});dragFrom=null;}

/* ══ STATS ══════════════════════════════════════════ */
function renderStats(){
  const active=patterns.filter(p=>!p.archived);
  const tot=active.length;
  document.getElementById('st-done').textContent=active.filter(p=>p.done.every(Boolean)&&p.done.length).length;
  document.getElementById('st-rows').textContent=active.reduce((a,p)=>a+p.done.filter(Boolean).length,0);
  document.getElementById('st-active').textContent=active.filter(p=>p.done.some(Boolean)&&!p.done.every(Boolean)).length;
  document.getElementById('st-avg').textContent=(tot?Math.round(active.reduce((a,p)=>a+p.done.filter(Boolean).length/p.rows.length,0)/tot*100):0)+'%';
  const all=new Set(patterns.flatMap(p=>(p.activity||[]).map(d=>new Date(d).setHours(0,0,0,0))));
  const today=new Date().setHours(0,0,0,0);
  document.getElementById('heatmap').innerHTML=Array.from({length:70},(_,ii)=>{
    const d=today-(69-ii)*86400000;const h=all.has(d);const l=h?(Math.random()>.5?3:2):0;
    return `<div class="hm-day ${l?'l'+l:''}" title="${new Date(d).toLocaleDateString('en-GB')}"></div>`;
  }).join('');
  document.getElementById('stat-pats').innerHTML=active.length
    ?active.map(p=>{const dc=p.done.filter(Boolean).length,pct=Math.round(dc/p.rows.length*100);
      return `<div><div class="stat-ph"><span class="stat-pn">${esc(p.name)}</span><span class="stat-pp">${dc}/${p.rows.length} · ${pct}%</span></div><div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div></div>`;
    }).join('')
    :'<div style="color:var(--text3);font-size:13px;">No active patterns.</div>';
}

/* ══ ADD PATTERN ════════════════════════════════════ */
function startNew(){
  S.newRows=[];clearChips('form-chips');
  document.getElementById('new-name').value='';
  document.getElementById('s-note').value='';
  document.getElementById('s-rowname').value='';
  document.getElementById('saved-rows').innerHTML='';
  fillSelects('s-tech');
  navTo('add','New Pattern');
}

function finalizeRow(){
  const tech=document.getElementById('s-tech')?.value,count=parseInt(document.getElementById('s-count')?.value);
  if(tech&&count>=1)addChip('s-tech','s-count','form-chips');
  const chips=getChips('form-chips');
  if(!chips.length){toast('Add at least one stitch!');return;}
  const rname=document.getElementById('s-rowname')?.value.trim();
  const note=document.getElementById('s-note')?.value.trim()||'';
  const n=S.newRows.length+1;
  S.newRows.push({id:uid(),title:rname||(n+'. row'),stitches:[...chips],note});
  clearChips('form-chips');
  document.getElementById('s-rowname').value='';
  document.getElementById('s-note').value='';
  document.getElementById('s-tech').value='';
  document.getElementById('s-count').value='';
  renderNewRows();
}

function renderNewRows(){
  document.getElementById('saved-rows').innerHTML=S.newRows.map((r,i)=>
    `<div class="saved-row">
      <div class="saved-row-num">${i+1}</div>
      <div class="saved-row-txt"><b>${esc(r.title)}</b> — ${r.stitches.map(s=>`<b style="color:var(--teal)">${s.count}×</b> ${esc(s.name)}`).join(' · ')}${r.note?` <i style="color:var(--text3)">— ${esc(r.note)}</i>`:''}</div>
      <button class="saved-row-del" onclick="S.newRows.splice(${i},1);renderNewRows()">×</button>
    </div>`
  ).join('');
}

function savePattern(){
  const name=document.getElementById('new-name').value.trim();
  if(!name){toast('Enter a pattern name!');document.getElementById('new-name').focus();return;}
  const tech=document.getElementById('s-tech')?.value,count=parseInt(document.getElementById('s-count')?.value);
  if(tech&&count>=1)addChip('s-tech','s-count','form-chips');
  if(getChips('form-chips').length)finalizeRow();
  if(!S.newRows.length){toast('Add at least one row!');return;}
  patterns.push({id:uid(),name,createdAt:Date.now(),activity:[new Date().setHours(0,0,0,0)],archived:false,rows:S.newRows,done:new Array(S.newRows.length).fill(false)});
  S.newRows=[];clearChips('form-chips');save();toast('Pattern saved!');navTo('library');
}

/* ══ CONFIRM DIALOG ═════════════════════════════════ */
function showConfirm(title,msg,onOk){
  const ov=document.createElement('div');
  ov.className='overlay';
  ov.innerHTML=`<div class="confirm-box">
    <div class="confirm-title">${esc(title)}</div>
    <div class="confirm-msg">${esc(msg)}</div>
    <div class="confirm-btns">
      <button class="btn" onclick="this.closest('.overlay').remove()">Cancel</button>
      <button class="btn" style="background:var(--coral);border-color:var(--coral);color:#fff;" id="ok-btn">Delete</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  ov.querySelector('#ok-btn').onclick=()=>{ov.remove();onOk();};
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
}

/* ══ TOAST ══════════════════════════════════════════ */
let tt;
function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2500);
}

/* ══ INIT ═══════════════════════════════════════════ */
renderLib();
</script>
